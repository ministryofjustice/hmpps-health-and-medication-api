asyncapi: 3.0.0
info:
  title: HMPPS Health and Medication Events
  version: 1.0.0
  description: Events published when prisoner health and medication data changes

servers:
  development:
    host: "hmpps-domain-events-dev.live-1.cloud-platform.service.justice.gov.uk"
    protocol: sqs
    description: Development Environment
  preproduction:
    host: "hmpps-domain-events-preprod.live-1.cloud-platform.service.justice.gov.uk"
    protocol: sqs
    description: Pre-production Environment
  production:
    host: "hmpps-domain-events-prod.live-1.cloud-platform.service.justice.gov.uk"
    protocol: sqs
    description: Production Environment

components:
  messages:
    prisoner.dietary.information.updated:
      $ref: https://raw.githubusercontent.com/ministryofjustice/hmpps-domain-events/main/spec/schemas/health-and-medication/prisoner-dietary-information-updated.yaml

channels:
  hmpps-domain-events:
    description: HMPPS domain events SNS topic
    bindings:
      sns:
        name: domainevents
    messages:
      prisoner.dietary.information.updated:
        $ref: '#/components/messages/prisoner.dietary.information.updated'

operations:
  publish-event:
    action: send
    channel:
      $ref: '#/channels/hmpps-domain-events'
    messages:
      - $ref: '#/channels/hmpps-domain-events/messages/prisoner.dietary.information.updated'
